      display: flex;
      gap: 16px;
      padding: 20px;

      padding: 32px;
      border: 1px solid #0f3460;

      font-size: 1.6rem;
      font-weight: bold;

      background: var(--surface);

      border: 1px solid #0f3460;

      line-height: 1.8;

      overflow-y: auto;

      padding: 16px 24px;
      border-top: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

      font-weight: bold;

// ──────────────────────────────────────────────
// 상태
// ──────────────────────────────────────────────
let currentIdx = 0;
let isPlaying = false;
let timerInterval = null;
let elapsedSec = 0;
const MAX_SEC = 7 * 60;

const synth = window.speechSynthesis;
let utterance = null;

// ──────────────────────────────────────────────
// DOM
// ──────────────────────────────────────────────
const elTitle = document.getElementById('slide-title');
const elBody = document.getElementById('slide-body');
const elScript = document.getElementById('script-text');
const elCounter = document.getElementById('slide-counter');
const elTimer = document.getElementById('timer');
const elProgress = document.getElementById('progress-bar');
const btnPlay = document.getElementById('btn-play');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const btnStop = document.getElementById('btn-stop');
const btnReplay = document.getElementById('btn-replay');
const speedRange = document.getElementById('speed-range');
const speedVal = document.getElementById('speed-val');

// ──────────────────────────────────────────────
// 타이머
// ──────────────────────────────────────────────
function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    elapsedSec++;
    updateTimerDisplay();
    if (elapsedSec >= MAX_SEC) elTimer.classList.add('warn');
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(elapsedSec / 60);
  const s = elapsedSec % 60;
  elTimer.textContent = `${m}:${s.toString().padStart(2, '0')}`;
  const pct = Math.min((elapsedSec / MAX_SEC) * 100, 100);
  elProgress.style.width = pct + '%';
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

// ──────────────────────────────────────────────
// 슬라이드 렌더링
// ──────────────────────────────────────────────
function renderSlide() {
  const s = slides[currentIdx];
  elTitle.textContent = s.title;
  elBody.textContent = s.body;
  elScript.textContent = s.script;
  elCounter.textContent = `${currentIdx + 1} / ${slides.length}`;
  btnPrev.disabled = currentIdx === 0;
  btnNext.disabled = currentIdx === slides.length - 1;
}

// ──────────────────────────────────────────────
// TTS
// ──────────────────────────────────────────────
function speak(text, onEnd) {
  synth.cancel();
  utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'ko-KR';
  utterance.rate = parseFloat(speedRange.value);
  utterance.pitch = 1;

  // 읽는 위치 표시
  utterance.onboundary = (e) => {
    if (e.name !== 'word') return;
    const spoken = text.substring(0, e.charIndex + e.charLength);
    const rest = text.substring(e.charIndex + e.charLength);
    elScript.innerHTML =
      `<span class="spoken">${escHtml(spoken)}</span>${escHtml(rest)}`;
  };

  utterance.onend = () => {
    isPlaying = false;
    btnPlay.textContent = '▶ 재생';
    elScript.textContent = slides[currentIdx].script;
    if (onEnd) onEnd();
  };

  utterance.onerror = () => {
    isPlaying = false;
    btnPlay.textContent = '▶ 재생';
  };

  synth.speak(utterance);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function playCurrentSlide() {
  isPlaying = true;
  btnPlay.textContent = '⏸ 일시정지';
  startTimer();
  speak(slides[currentIdx].script);
}

function togglePlay() {
  if (synth.speaking && !synth.paused) {
    synth.pause();
    isPlaying = false;
    btnPlay.textContent = '▶ 재생';
    stopTimer();
  } else if (synth.paused) {
    synth.resume();
    isPlaying = true;
    btnPlay.textContent = '⏸ 일시정지';
    startTimer();
  } else {
    playCurrentSlide();
  }
}

function stopAll() {
  synth.cancel();
  isPlaying = false;
  btnPlay.textContent = '▶ 재생';
  stopTimer();
  renderSlide();
}

function prevSlide() {
  if (currentIdx > 0) {
    synth.cancel();
    isPlaying = false;
    btnPlay.textContent = '▶ 재생';
    currentIdx--;
    renderSlide();
  }
}

function nextSlide() {
  if (currentIdx < slides.length - 1) {
    synth.cancel();
    isPlaying = false;
    btnPlay.textContent = '▶ 재생';
    currentIdx++;
    renderSlide();
  }
}

// ──────────────────────────────────────────────
// 이벤트
// ──────────────────────────────────────────────
btnPlay.addEventListener('click', togglePlay);
btnStop.addEventListener('click', stopAll);
btnPrev.addEventListener('click', prevSlide);
btnNext.addEventListener('click', nextSlide);
btnReplay.addEventListener('click', () => { synth.cancel(); playCurrentSlide(); });

speedRange.addEventListener('input', () => {
  speedVal.textContent = speedRange.value;
  if (utterance) utterance.rate = parseFloat(speedRange.value);
});

document.addEventListener('keydown', (e) => {
  switch(e.code) {
    case 'Space': e.preventDefault(); togglePlay(); break;
    case 'ArrowLeft': prevSlide(); break;
    case 'ArrowRight': nextSlide(); break;
    case 'KeyR': synth.cancel(); playCurrentSlide(); break;
  }
});

// 초기화
renderSlide();
</script>
</body>
