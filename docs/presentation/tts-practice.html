<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>중간 발표 TTS 연습 — Jangre</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --accent: #e2c27d;
      --accent2: #e94560;
      --text: #eaeaea;
      --text-muted: #888;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 헤더 */
    header {
      background: var(--surface);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--accent2);
    }
    header h1 { font-size: 1.1rem; color: var(--accent); }
    #timer {
      font-size: 1.5rem;
      font-weight: bold;
      font-variant-numeric: tabular-nums;
      color: #fff;
      background: #0f3460;
      padding: 4px 16px;
      border-radius: 8px;
      min-width: 80px;
      text-align: center;
    }
    #timer.warn { color: var(--accent2); }

    /* 슬라이드 번호 */
    #slide-counter {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* 메인 */
    main {
      flex: 1;
      display: flex;
      gap: 16px;
      padding: 20px;
    }

    /* 슬라이드 패널 */
    #slide-panel {
      flex: 1;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 32px;
      border: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
    }
    #slide-title {
      font-size: 1.6rem;
      font-weight: bold;
      color: var(--accent);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--accent2);
    }
    #slide-body {
      flex: 1;
      font-size: 1.05rem;
      line-height: 1.9;
      color: var(--text);
      white-space: pre-wrap;
    }

    /* TTS 스크립트 패널 */
    #script-panel {
      width: 340px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
    }
    #script-panel h3 {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #script-text {
      flex: 1;
      font-size: 1rem;
      line-height: 1.8;
      color: #ccc;
      overflow-y: auto;
    }
    #script-text .spoken {
      color: var(--accent);
      font-weight: bold;
    }

    /* 컨트롤 */
    #controls {
      background: var(--surface);
      padding: 16px 24px;
      border-top: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.35; cursor: default; }
    #btn-prev { background: #0f3460; color: #fff; }
    #btn-play { background: var(--accent2); color: #fff; min-width: 100px; }
    #btn-next { background: #0f3460; color: #fff; }
    #btn-stop { background: #444; color: #fff; }
    #btn-replay { background: #333; color: var(--accent); }

    .sep { flex: 1; }

    label { color: var(--text-muted); font-size: 0.85rem; }
    #speed-range { width: 100px; accent-color: var(--accent); }
    #speed-val { color: var(--accent); font-weight: bold; min-width: 28px; display: inline-block; }

    /* 진행 바 */
    #progress-bar-wrap {
      background: #0f3460;
      height: 6px;
      width: 100%;
    }
    #progress-bar {
      height: 100%;
      background: var(--accent2);
      width: 0%;
      transition: width 0.3s;
    }

    /* 힌트 */
    #hint {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      padding: 6px;
    }
  </style>
</head>
<body>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<header>
  <h1>⚔️ Jangre — 중간 발표 TTS 연습</h1>
  <span id="slide-counter">1 / 9</span>
  <div id="timer">0:00</div>
</header>

<main>
  <div id="slide-panel">
    <div id="slide-title"></div>
    <div id="slide-body"></div>
  </div>
  <div id="script-panel">
    <h3>🎙 TTS 스크립트</h3>

  </div>

<div id="controls">
  <button class="btn" id="btn-prev">◀ 이전</button>
  <button class="btn" id="btn-play">▶ 재생</button>
  <button class="btn" id="btn-stop">⏹ 중지</button>
  <button class="btn" id="btn-replay">🔁 이 슬라이드 반복</button>
  <span class="sep"></span>
  <label>속도: <input type="range" id="speed-range" min="0.6" max="1.6" step="0.1" value="1.0" />
  <span id="speed-val">1.0</span>×</label>
</div>

<div id="hint">단축키: Space = 재생/일시정지 · ← → = 슬라이드 이동 · R = 이 슬라이드 반복</div>

let currentIdx = 0;
let isPlaying = false;
let timerInterval = null;
let elapsedSec = 0;
const MAX_SEC = 7 * 60;

const synth = window.speechSynthesis;
let utterance = null;

// ──────────────────────────────────────────────
// DOM
// ──────────────────────────────────────────────
const elTitle = document.getElementById('slide-title');
const elBody = document.getElementById('slide-body');
const elScript = document.getElementById('script-text');
const elCounter = document.getElementById('slide-counter');
const elTimer = document.getElementById('timer');
const elProgress = document.getElementById('progress-bar');
const btnPlay = document.getElementById('btn-play');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const btnStop = document.getElementById('btn-stop');
const btnReplay = document.getElementById('btn-replay');
const speedRange = document.getElementById('speed-range');
const speedVal = document.getElementById('speed-val');

// ──────────────────────────────────────────────
// 타이머
// ──────────────────────────────────────────────
function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    elapsedSec++;
    updateTimerDisplay();
    if (elapsedSec >= MAX_SEC) elTimer.classList.add('warn');
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(elapsedSec / 60);
  const s = elapsedSec % 60;
  elTimer.textContent = `${m}:${s.toString().padStart(2, '0')}`;
  const pct = Math.min((elapsedSec / MAX_SEC) * 100, 100);
  elProgress.style.width = pct + '%';
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

// ──────────────────────────────────────────────
// 슬라이드 렌더링
// ──────────────────────────────────────────────
function renderSlide() {
  const s = slides[currentIdx];
  elTitle.textContent = s.title;
  elBody.textContent = s.body;
  elScript.textContent = s.script;
  elCounter.textContent = `${currentIdx + 1} / ${slides.length}`;
  btnPrev.disabled = currentIdx === 0;
  btnNext.disabled = currentIdx === slides.length - 1;
}

// ──────────────────────────────────────────────
// TTS
// ──────────────────────────────────────────────
function speak(text, onEnd) {
  synth.cancel();
  utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'ko-KR';
  utterance.rate = parseFloat(speedRange.value);
  utterance.pitch = 1;

  // 읽는 위치 표시
  utterance.onboundary = (e) => {
    if (e.name !== 'word') return;
    const spoken = text.substring(0, e.charIndex + e.charLength);
    const rest = text.substring(e.charIndex + e.charLength);
    elScript.innerHTML =
      `<span class="spoken">${escHtml(spoken)}</span>${escHtml(rest)}`;
  };

  utterance.onend = () => {
    isPlaying = false;
    btnPlay.textContent = '▶ 재생';
    elScript.textContent = slides[currentIdx].script;
    if (onEnd) onEnd();
  };

  utterance.onerror = () => {
    isPlaying = false;
    btnPlay.textContent = '▶ 재생';
  };

  synth.speak(utterance);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function playCurrentSlide() {
  isPlaying = true;
  btnPlay.textContent = '⏸ 일시정지';
  startTimer();
  speak(slides[currentIdx].script);
}

function togglePlay() {
  if (synth.speaking && !synth.paused) {
    synth.pause();
    isPlaying = false;
    btnPlay.textContent = '▶ 재생';
    stopTimer();
  } else if (synth.paused) {
    synth.resume();
    isPlaying = true;
    btnPlay.textContent = '⏸ 일시정지';
    startTimer();
  } else {
    playCurrentSlide();
  }
}

function stopAll() {
  synth.cancel();
  isPlaying = false;
  btnPlay.textContent = '▶ 재생';
  stopTimer();
  renderSlide();
}

function prevSlide() {
  if (currentIdx > 0) {
    synth.cancel();
    isPlaying = false;
    btnPlay.textContent = '▶ 재생';
    currentIdx--;
    renderSlide();
  }
}

function nextSlide() {
  if (currentIdx < slides.length - 1) {
    synth.cancel();
    isPlaying = false;
    btnPlay.textContent = '▶ 재생';
    currentIdx++;
    renderSlide();
  }
}

// ──────────────────────────────────────────────
// 이벤트
// ──────────────────────────────────────────────
btnPlay.addEventListener('click', togglePlay);
btnStop.addEventListener('click', stopAll);
btnPrev.addEventListener('click', prevSlide);
btnNext.addEventListener('click', nextSlide);
btnReplay.addEventListener('click', () => { synth.cancel(); playCurrentSlide(); });

speedRange.addEventListener('input', () => {
  speedVal.textContent = speedRange.value;
  if (utterance) utterance.rate = parseFloat(speedRange.value);
});

document.addEventListener('keydown', (e) => {
  switch(e.code) {
    case 'Space': e.preventDefault(); togglePlay(); break;
    case 'ArrowLeft': prevSlide(); break;
    case 'ArrowRight': nextSlide(); break;
    case 'KeyR': synth.cancel(); playCurrentSlide(); break;
  }
});

// 초기화
renderSlide();
</script>
</body>
</html>
